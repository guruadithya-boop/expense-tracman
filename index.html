<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .video-background video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .header p {
            font-size: 1.3em;
            opacity: 0.9;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .auth-container h2 {
            margin-bottom: 30px;
            color: #333;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 2px solid #4285f4;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #333;
            transition: all 0.3s;
            width: 100%;
        }

        .google-btn:hover {
            background: #4285f4;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
        }

        .google-btn img {
            width: 24px;
            height: 24px;
            margin-right: 12px;
        }

        .user-panel {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .user-info img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-right: 15px;
        }

        .user-details h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .user-details p {
            color: #666;
            font-size: 0.9em;
        }

        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .nav-btn {
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .nav-btn.primary {
            background: #4285f4;
            color: white;
        }

        .nav-btn.primary:hover {
            background: #357abd;
            transform: translateY(-2px);
        }

        .nav-btn.secondary {
            background: #34a853;
            color: white;
        }

        .nav-btn.secondary:hover {
            background: #2d8e47;
            transform: translateY(-2px);
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: #ea4335;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #c5392b;
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            color: white;
            font-size: 1.2em;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5em;
            }

            .header p {
                font-size: 1.1em;
            }

            .nav-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="https://github.com/guruadithya-boop/expense-tracman/raw/main/138315-769163810_medium.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <div class="container">
        <div class="header">
            <h1>💰 Expense Tracker</h1>
            <p>Manage your finances with ease</p>
        </div>

        <div class="loading" id="loading">Loading...</div>

        <div class="auth-container" id="authContainer">
            <h2>Welcome!</h2>
            <button class="google-btn" id="googleSignIn">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                Sign in with Google
            </button>
        </div>

        <div class="user-panel" id="userPanel">
            <div class="user-info">
                <img id="userPhoto" src="" alt="User">
                <div class="user-details">
                    <h3 id="userName"></h3>
                    <p id="userEmail"></p>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="datain.html" class="nav-btn primary">📝 Add Expense</a>
                <a href="stat.html" class="nav-btn secondary">📊 View Statistics</a>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFc3U-imil2VLvFuCFGVueoyN5CQw-Ob0",
            authDomain: "expensetracman.firebaseapp.com",
            projectId: "expensetracman",
            storageBucket: "expensetracman.firebasestorage.app",
            messagingSenderId: "506374951062",
            appId: "1:506374951062:web:479ec46668ecbf66f072b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const authContainer = document.getElementById('authContainer');
        const userPanel = document.getElementById('userPanel');
        const loading = document.getElementById('loading');
        const googleSignInBtn = document.getElementById('googleSignIn');
        const logoutBtn = document.getElementById('logoutBtn');

        // Google Sign In
        googleSignInBtn.addEventListener('click', async () => {
            try {
                loading.style.display = 'block';
                const result = await signInWithPopup(auth, provider);
                console.log('User signed in:', result.user);
            } catch (error) {
                console.error('Error signing in:', error);
                alert('Failed to sign in. Please try again.');
                loading.style.display = 'none';
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                console.log('User signed out');
            } catch (error) {
                console.error('Error signing out:', error);
                alert('Failed to sign out. Please try again.');
            }
        });

        // Auth state observer
        onAuthStateChanged(auth, (user) => {
            loading.style.display = 'none';
            if (user) {
                // User is signed in
                authContainer.style.display = 'none';
                userPanel.style.display = 'block';
                
                document.getElementById('userName').textContent = user.displayName;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userPhoto').src = user.photoURL || 'https://via.placeholder.com/60';
                
                // Store user info in localStorage
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: user.uid,
                    displayName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL
                }));
            } else {
                // User is signed out
                authContainer.style.display = 'block';
                userPanel.style.display = 'none';
                localStorage.removeItem('currentUser');
            }
        });

        // Export db for other pages
        window.db = db;
        window.auth = auth;
    </script>
</body>
</html>
