<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
        }

        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }

        .stat-card.total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stat-card.total h3,
        .stat-card.total .stat-value {
            color: white;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .chart-container h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .category-bar {
            margin-bottom: 15px;
        }

        .category-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .bar-wrapper {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
        }

        .bar-food { background: linear-gradient(90deg, #ff6b6b, #ee5a6f); }
        .bar-transport { background: linear-gradient(90deg, #4ecdc4, #44a08d); }
        .bar-shopping { background: linear-gradient(90deg, #a8edea, #fed6e3); color: #333 !important; }
        .bar-entertainment { background: linear-gradient(90deg, #ffa500, #ff6347); }
        .bar-bills { background: linear-gradient(90deg, #11998e, #38ef7d); }
        .bar-other { background: linear-gradient(90deg, #8e44ad, #c0392b); }

        .time-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .monthly-breakdown {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .month-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-item:last-child {
            border-bottom: none;
        }

        .month-name {
            font-weight: 600;
            color: #333;
        }

        .month-amount {
            font-size: 1.3em;
            font-weight: bold;
            color: #ea4335;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .report-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pdf-btn {
            background: #ea4335;
            color: white;
        }

        .pdf-btn:hover {
            background: #c5392b;
            transform: translateY(-2px);
        }

        .excel-btn {
            background: #34a853;
            color: white;
        }

        .excel-btn:hover {
            background: #2d8e47;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .report-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Statistics & Reports</h1>
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>

        <div class="report-actions">
            <button class="action-btn pdf-btn" onclick="generatePDFReport()">📄 Generate PDF Report</button>
            <button class="action-btn excel-btn" onclick="generateExcelReport()">📊 Export to Excel</button>
        </div>

        <div class="time-filter">
            <button class="filter-btn active" data-filter="all">All Time</button>
            <button class="filter-btn" data-filter="month">This Month</button>
            <button class="filter-btn" data-filter="week">This Week</button>
            <button class="filter-btn" data-filter="today">Today</button>
        </div>

        <div id="statsContent" class="loading">Loading statistics...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFc3U-imil2VLvFuCFGVueoyN5CQw-Ob0",
            authDomain: "expensetracman.firebaseapp.com",
            projectId: "expensetracman",
            storageBucket: "expensetracman.firebasestorage.app",
            messagingSenderId: "506374951062",
            appId: "1:506374951062:web:479ec46668ecbf66f072b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allExpenses = [];
        let currentFilter = 'all';

        // Check authentication
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadExpenses();
            } else {
                window.location.href = 'index.html';
            }
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                displayStats(filterExpenses(allExpenses));
            });
        });

        async function loadExpenses() {
            try {
                const q = query(
                    collection(db, 'expenses'),
                    where('userId', '==', currentUser.uid),
                    orderBy('date', 'desc')
                );

                const querySnapshot = await getDocs(q);
                allExpenses = [];
                
                querySnapshot.forEach((doc) => {
                    allExpenses.push({ id: doc.id, ...doc.data() });
                });

                displayStats(filterExpenses(allExpenses));
            } catch (error) {
                console.error('Error loading expenses:', error);
                document.getElementById('statsContent').innerHTML = 
                    '<div style="text-align: center; color: white; padding: 40px;">Error loading statistics. Please try again.</div>';
            }
        }

        function filterExpenses(expenses) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekAgo = new Date(today);
            weekAgo.setDate(weekAgo.getDate() - 7);
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

            return expenses.filter(expense => {
                const expenseDate = new Date(expense.date);
                switch(currentFilter) {
                    case 'today':
                        return expenseDate >= today;
                    case 'week':
                        return expenseDate >= weekAgo;
                    case 'month':
                        return expenseDate >= monthStart;
                    default:
                        return true;
                }
            });
        }

        function displayStats(expenses) {
            if (expenses.length === 0) {
                document.getElementById('statsContent').innerHTML = `
                    <div style="text-align: center; color: white; padding: 40px;">
                        <h2>No expenses found for this period</h2>
                        <p>Add some expenses to see statistics</p>
                    </div>
                `;
                return;
            }

            const stats = calculateStats(expenses);
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card total">
                        <h3>Total Spent</h3>
                        <div class="stat-value">$${stats.total.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Average per Day</h3>
                        <div class="stat-value">$${stats.avgPerDay.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Transactions</h3>
                        <div class="stat-value">${stats.count}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Highest Category</h3>
                        <div class="stat-value" style="font-size: 1.8em;">${stats.topCategory}</div>
                    </div>
                </div>

                <div class="chart-container">
                    <h2>Expenses by Category</h2>
                    ${generateCategoryBars(stats.byCategory, stats.total)}
                </div>

                <div class="monthly-breakdown">
                    <h2>Monthly Breakdown</h2>
                    ${generateMonthlyBreakdown(expenses)}
                </div>
            `;

            document.getElementById('statsContent').innerHTML = html;
        }

        function calculateStats(expenses) {
            const total = expenses.reduce((sum, exp) => sum + exp.amount, 0);
            const count = expenses.length;
            
            const byCategory = {};
            expenses.forEach(exp => {
                byCategory[exp.category] = (byCategory[exp.category] || 0) + exp.amount;
            });

            const topCategory = Object.keys(byCategory).reduce((a, b) => 
                byCategory[a] > byCategory[b] ? a : b, 'N/A'
            );

            const dates = expenses.map(exp => new Date(exp.date));
            const minDate = new Date(Math.min(...dates));
            const maxDate = new Date(Math.max(...dates));
            const daysDiff = Math.max(1, Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24)) + 1);
            const avgPerDay = total / daysDiff;

            return { total, count, byCategory, topCategory, avgPerDay };
        }

        function generateCategoryBars(byCategory, total) {
            const categories = {
                food: '🍔 Food',
                transport: '🚗 Transport',
                shopping: '🛍️ Shopping',
                entertainment: '🎬 Entertainment',
                bills: '💡 Bills',
                other: '📦 Other'
            };

            let html = '';
            Object.keys(categories).forEach(key => {
                const amount = byCategory[key] || 0;
                const percentage = total > 0 ? (amount / total * 100) : 0;
                
                html += `
                    <div class="category-bar">
                        <div class="category-label">
                            <span>${categories[key]}</span>
                            <span>$${amount.toFixed(2)}</span>
                        </div>
                        <div class="bar-wrapper">
                            <div class="bar-fill bar-${key}" style="width: ${percentage}%">
                                ${percentage > 15 ? percentage.toFixed(1) + '%' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            return html;
        }

        function generateMonthlyBreakdown(expenses) {
            const byMonth = {};
            
            expenses.forEach(exp => {
                const date = new Date(exp.date);
                const monthKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                byMonth[monthKey] = (byMonth[monthKey] || 0) + exp.amount;
            });

            let html = '';
            Object.keys(byMonth).sort().reverse().forEach(monthKey => {
                const [year, month] = monthKey.split('-');
                const monthName = new Date(year, month - 1).toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long' 
                });
                
                html += `
                    <div class="month-item">
                        <div class="month-name">${monthName}</div>
                        <div class="month-amount">$${byMonth[monthKey].toFixed(2)}</div>
                    </div>
                `;
            });

            return html || '<p style="text-align: center; color: #666;">No monthly data available</p>';
        }

        // Generate fake PDF report (simulated Python backend)
        window.generatePDFReport = function() {
            alert('📄 Generating PDF Report...\n\n✅ Report generated successfully!\n\n(This is a simulated Python backend response)\n\nIn production, this would call a Python API endpoint that generates a real PDF using libraries like ReportLab or WeasyPrint.');
            
            // Simulate download
            console.log('Python Backend would process:', {
                user: currentUser.email,
                expenses: filterExpenses(allExpenses),
                timestamp: new Date().toISOString()
            });
        };

        // Generate fake Excel export (simulated Python backend)
        window.generateExcelReport = function() {
            alert('📊 Exporting to Excel...\n\n✅ Excel file generated successfully!\n\n(This is a simulated Python backend response)\n\nIn production, this would call a Python API endpoint that generates a real Excel file using libraries like openpyxl or pandas.');
            
            // Simulate download
            console.log('Python Backend would process:', {
                user: currentUser.email,
                expenses: filterExpenses(allExpenses),
                format: 'xlsx',
                timestamp: new Date().toISOString()
            });
        };
    </script>
</body>
</html>
