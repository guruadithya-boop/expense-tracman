<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
        }

        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .expense-form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #34a853;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #2d8e47;
            transform: translateY(-2px);
        }

        .expenses-list {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .expenses-list h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .expense-item {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .expense-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        .expense-details {
            flex: 1;
        }

        .expense-category {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .category-food { background: #ffebee; color: #c62828; }
        .category-transport { background: #e3f2fd; color: #1565c0; }
        .category-shopping { background: #f3e5f5; color: #6a1b9a; }
        .category-entertainment { background: #fff3e0; color: #e65100; }
        .category-bills { background: #e8f5e9; color: #2e7d32; }
        .category-other { background: #fce4ec; color: #880e4f; }

        .expense-amount {
            font-size: 1.5em;
            font-weight: bold;
            color: #ea4335;
        }

        .expense-date {
            font-size: 0.9em;
            color: #666;
        }

        .delete-btn {
            padding: 8px 16px;
            background: #ea4335;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #c5392b;
        }

        .no-expenses {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .expense-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .expense-amount {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Add Expense</h1>
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>

        <div class="expense-form">
            <form id="expenseForm">
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" step="0.01" required min="0.01">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="food">🍔 Food & Dining</option>
                        <option value="transport">🚗 Transport</option>
                        <option value="shopping">🛍️ Shopping</option>
                        <option value="entertainment">🎬 Entertainment</option>
                        <option value="bills">💡 Bills & Utilities</option>
                        <option value="other">📦 Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" required></textarea>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>

                <button type="submit" class="submit-btn">Add Expense</button>
            </form>
        </div>

        <div class="expenses-list">
            <h2>Recent Expenses</h2>
            <div id="expensesList" class="loading">Loading expenses...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFc3U-imil2VLvFuCFGVueoyN5CQw-Ob0",
            authDomain: "expensetracman.firebaseapp.com",
            projectId: "expensetracman",
            storageBucket: "expensetracman.firebasestorage.app",
            messagingSenderId: "506374951062",
            appId: "1:506374951062:web:479ec46668ecbf66f072b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Check authentication
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadExpenses();
            } else {
                window.location.href = 'index.html';
            }
        });

        // Set default date to today
        document.getElementById('date').valueAsDate = new Date();

        // Handle form submission
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!currentUser) {
                alert('Please sign in to add expenses');
                return;
            }

            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
            const date = document.getElementById('date').value;

            try {
                await addDoc(collection(db, 'expenses'), {
                    userId: currentUser.uid,
                    amount: amount,
                    category: category,
                    description: description,
                    date: date,
                    createdAt: serverTimestamp()
                });

                // Reset form
                document.getElementById('expenseForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                
                alert('Expense added successfully!');
                loadExpenses();
            } catch (error) {
                console.error('Error adding expense:', error);
                alert('Failed to add expense. Please try again.');
            }
        });

        // Load expenses
        async function loadExpenses() {
            const expensesList = document.getElementById('expensesList');
            expensesList.innerHTML = '<div class="loading">Loading expenses...</div>';

            try {
                const q = query(
                    collection(db, 'expenses'),
                    where('userId', '==', currentUser.uid),
                    orderBy('date', 'desc')
                );

                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    expensesList.innerHTML = '<div class="no-expenses">No expenses yet. Add your first expense above!</div>';
                    return;
                }

                let html = '';
                querySnapshot.forEach((doc) => {
                    const expense = doc.data();
                    html += `
                        <div class="expense-item">
                            <div class="expense-details">
                                <span class="expense-category category-${expense.category}">${getCategoryIcon(expense.category)} ${expense.category.charAt(0).toUpperCase() + expense.category.slice(1)}</span>
                                <div style="margin-top: 5px; font-weight: 600;">${expense.description}</div>
                                <div class="expense-date">${formatDate(expense.date)}</div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <div class="expense-amount">$${expense.amount.toFixed(2)}</div>
                                <button class="delete-btn" onclick="deleteExpense('${doc.id}')">🗑️</button>
                            </div>
                        </div>
                    `;
                });

                expensesList.innerHTML = html;
            } catch (error) {
                console.error('Error loading expenses:', error);
                expensesList.innerHTML = '<div class="no-expenses">Error loading expenses. Please try again.</div>';
            }
        }

        // Delete expense
        window.deleteExpense = async function(expenseId) {
            if (!confirm('Are you sure you want to delete this expense?')) {
                return;
            }

            try {
                await deleteDoc(doc(db, 'expenses', expenseId));
                loadExpenses();
            } catch (error) {
                console.error('Error deleting expense:', error);
                alert('Failed to delete expense. Please try again.');
            }
        };

        function getCategoryIcon(category) {
            const icons = {
                food: '🍔',
                transport: '🚗',
                shopping: '🛍️',
                entertainment: '🎬',
                bills: '💡',
                other: '📦'
            };
            return icons[category] || '📦';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }
    </script>
</body>
</html>
